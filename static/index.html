<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpeakerSkip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #222;
      --accent: #e8ff3c;
      --accent2: #ff4f4f;
      --text: #f0f0f0;
      --muted: #555;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      padding: 28px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--accent); }

    .tag {
      font-family: var(--mono);
      font-size: 10px;
      background: var(--border);
      padding: 3px 8px;
      border-radius: 3px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    main {
      display: grid;
      grid-template-columns: 380px 1fr;
      min-height: 0;
    }

    /* LEFT PANEL */
    .panel {
      border-right: 1px solid var(--border);
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 12px 14px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus, input[type="password"]:focus {
      border-color: var(--accent);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #000;
      font-family: var(--sans);
      font-weight: 700;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .status {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 20px;
    }

    .status.active { color: var(--accent); }
    .status.error { color: var(--accent2); }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* SPEAKERS */
    .speakers-section { display: none; }

    .speaker-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .speaker-card:hover { border-color: #444; background: #141414; }

    .speaker-card.skipped {
      border-color: var(--accent2);
      background: rgba(255, 79, 79, 0.05);
    }

    .speaker-name {
      font-size: 15px;
      font-weight: 700;
    }

    .speaker-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    .skip-badge {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1px;
      padding: 4px 8px;
      border-radius: 3px;
      text-transform: uppercase;
      background: var(--border);
      color: var(--muted);
      transition: all 0.15s;
    }

    .speaker-card.skipped .skip-badge {
      background: var(--accent2);
      color: #fff;
    }

    .skip-hint {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      padding: 6px 0;
    }

    /* RIGHT PANEL */
    .content {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .player-area {
      padding: 28px 32px;
      border-bottom: 1px solid var(--border);
      display: none;
    }

    .player-wrap {
      position: relative;
      padding-bottom: 56.25%;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
    }

    #yt-player {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    .now-speaking {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .now-speaking .speaker-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
      color: var(--text);
      transition: all 0.2s;
    }

    .now-speaking .speaker-pill.skipping {
      background: rgba(255, 79, 79, 0.15);
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* TRANSCRIPT */
    .transcript-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .transcript-area::-webkit-scrollbar { width: 4px; }
    .transcript-area::-webkit-scrollbar-thumb { background: var(--border); }

    .transcript-empty {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
    }

    .big-icon { font-size: 48px; opacity: 0.3; }

    .transcript-empty p {
      font-family: var(--mono);
      font-size: 12px;
      text-align: center;
      line-height: 1.7;
    }

    .utterance {
      display: flex;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid #161616;
      transition: background 0.1s;
      cursor: pointer;
    }

    .utterance:hover { background: #111; border-radius: 6px; padding: 12px 8px; }

    .utterance.active-utt {
      background: #111;
      border-radius: 6px;
      padding: 12px 8px;
    }

    .utterance.active-utt .utt-speaker { color: var(--accent); }

    .utterance.skipped-utt {
      opacity: 0.3;
    }

    .utt-speaker {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      min-width: 72px;
      color: var(--muted);
      padding-top: 2px;
      flex-shrink: 0;
    }

    .utt-time {
      font-family: var(--mono);
      font-size: 10px;
      color: #333;
      padding-top: 4px;
      min-width: 42px;
      flex-shrink: 0;
    }

    .utt-text {
      font-size: 14px;
      line-height: 1.65;
      color: #ccc;
    }

    /* empty placeholder */
    .placeholder-lines { display: flex; flex-direction: column; gap: 16px; width: 100%; }
    .ph-line { height: 14px; background: var(--surface); border-radius: 4px; animation: shimmer 1.5s infinite; }
    @keyframes shimmer {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Speaker<span>Skip</span></div>
  <div class="tag">Beta</div>
</header>

<main>
  <!-- LEFT PANEL -->
  <div class="panel">
    <div>
      <div class="section-label">AssemblyAI API Key</div>
      <input type="password" id="api-key" placeholder="your_assemblyai_key" />
    </div>

    <div>
      <div class="section-label">YouTube URL</div>
      <input type="text" id="yt-url" placeholder="https://youtube.com/watch?v=..." />
    </div>

    <button class="btn" id="process-btn" onclick="processVideo()">Process Video</button>

    <div class="status" id="status-msg"></div>

    <!-- SPEAKERS -->
    <div class="speakers-section" id="speakers-section">
      <div class="section-label">Speakers Detected</div>
      <div id="speaker-list"></div>
      <div class="skip-hint">Click a speaker to toggle skip</div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="content">
    <div class="player-area" id="player-area">
      <div class="player-wrap">
        <div id="yt-player"></div>
      </div>
      <div class="now-speaking">
        <span>Now speaking:</span>
        <span class="speaker-pill" id="now-speaker">—</span>
        <span id="skip-indicator" style="color: var(--accent2); display:none;">⏩ SKIPPING</span>
      </div>
    </div>

    <div class="transcript-area" id="transcript-area">
      <div class="transcript-empty" id="transcript-empty">
        <div class="big-icon">🎙️</div>
        <p>Paste a YouTube link and your<br/>AssemblyAI key, then hit Process.<br/><br/>Speaker diarization will identify<br/>who says what. Pick speakers to skip.</p>
      </div>
      <div id="transcript-list"></div>
    </div>
  </div>
</main>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
  let player = null;
  let segments = [];
  let skippedSpeakers = new Set();
  let skipInterval = null;
  let videoId = null;
  let speakerColors = {};
  const COLORS = ['#e8ff3c','#4ff0b7','#ff9f4a','#a78bfa','#60a5fa','#f472b6'];

  // ─── PROCESS ────────────────────────────────────────────────
  async function processVideo() {
    const url = document.getElementById('yt-url').value.trim();
    const key = document.getElementById('api-key').value.trim();

    if (!url || !key) {
      setStatus('Fill in the API key and YouTube URL first.', 'error');
      return;
    }

    setStatus('Starting...', 'active');
    document.getElementById('process-btn').disabled = true;

    try {
      const res = await fetch('/process', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ youtube_url: url, api_key: key }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Server error');
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed.startsWith('data: ')) continue;
          const jsonStr = trimmed.slice(6);
          if (!jsonStr) continue;

          let data;
          try {
            data = JSON.parse(jsonStr);
          } catch(e) {
            continue; // skip malformed lines
          }

          if (data.status === 'error') {
            setStatus(data.msg, 'error');
            document.getElementById('process-btn').disabled = false;
            return;
          }

          if (data.status === 'downloading' || data.status === 'transcribing') {
            setStatus(data.msg, 'active');
          }

          if (data.status === 'done') {
            videoId = data.video_id;
            segments = data.segments;

            data.speakers.forEach((sp, i) => {
              speakerColors[sp] = COLORS[i % COLORS.length];
            });

            renderSpeakers(data.speakers);
            renderTranscript(segments);
            initPlayer(videoId);

            setStatus(`Done — ${data.speakers.length} speakers, ${segments.length} segments.`, '');
            document.getElementById('process-btn').disabled = false;
          }
        }
      }
    } catch (e) {
      setStatus(e.message, 'error');
      document.getElementById('process-btn').disabled = false;
    }
  }

  // ─── STATUS ─────────────────────────────────────────────────
  function setStatus(msg, type) {
    const el = document.getElementById('status-msg');
    el.className = 'status ' + (type || '');
    el.innerHTML = type === 'active'
      ? `<span class="dot"></span>${msg}`
      : msg;
  }

  // ─── SPEAKERS ───────────────────────────────────────────────
  function renderSpeakers(speakers) {
    const section = document.getElementById('speakers-section');
    const list = document.getElementById('speaker-list');
    section.style.display = 'block';
    list.innerHTML = '';

    speakers.forEach(sp => {
      const segCount = segments.filter(s => s.speaker === sp).length;
      const duration = segments.filter(s => s.speaker === sp)
        .reduce((acc, s) => acc + (s.end - s.start), 0);

      const card = document.createElement('div');
      card.className = 'speaker-card';
      card.id = `sp-card-${sp}`;
      card.style.setProperty('--sp-color', speakerColors[sp]);
      card.innerHTML = `
        <div>
          <div class="speaker-name" style="color: ${speakerColors[sp]}">Speaker ${sp}</div>
          <div class="speaker-meta">${segCount} segments · ${fmt(duration)}</div>
        </div>
        <div class="skip-badge" id="badge-${sp}">Keep</div>
      `;
      card.onclick = () => toggleSkip(sp);
      list.appendChild(card);
    });
  }

  function toggleSkip(sp) {
    if (skippedSpeakers.has(sp)) {
      skippedSpeakers.delete(sp);
      document.getElementById(`sp-card-${sp}`).classList.remove('skipped');
      document.getElementById(`badge-${sp}`).textContent = 'Keep';
    } else {
      skippedSpeakers.add(sp);
      document.getElementById(`sp-card-${sp}`).classList.add('skipped');
      document.getElementById(`badge-${sp}`).textContent = 'Skip';
    }
    renderTranscript(segments); // re-dim skipped utterances
  }

  // ─── TRANSCRIPT ─────────────────────────────────────────────
  function renderTranscript(segs) {
    const empty = document.getElementById('transcript-empty');
    const list = document.getElementById('transcript-list');
    empty.style.display = 'none';
    list.innerHTML = '';

    segs.forEach((seg, i) => {
      const div = document.createElement('div');
      div.className = 'utterance' + (skippedSpeakers.has(seg.speaker) ? ' skipped-utt' : '');
      div.id = `utt-${i}`;
      div.innerHTML = `
        <div class="utt-speaker" style="color: ${speakerColors[seg.speaker] || '#888'}">${seg.speaker}</div>
        <div class="utt-time">${fmt(seg.start)}</div>
        <div class="utt-text">${seg.text}</div>
      `;
      div.onclick = () => { if (player) player.seekTo(seg.start, true); };
      list.appendChild(div);
    });
  }

  // ─── PLAYER ─────────────────────────────────────────────────
  function initPlayer(vid) {
    document.getElementById('player-area').style.display = 'block';

    if (player) {
      player.loadVideoById(vid);
      return;
    }

    player = new YT.Player('yt-player', {
      videoId: vid,
      playerVars: { autoplay: 0, modestbranding: 1, rel: 0 },
      events: {
        onReady: () => startSkipEngine(),
        onStateChange: (e) => {
          if (e.data === YT.PlayerState.PLAYING) startSkipEngine();
          else stopSkipEngine();
        },
      },
    });
  }

  function startSkipEngine() {
    stopSkipEngine();
    skipInterval = setInterval(tick, 200);
  }

  function stopSkipEngine() {
    if (skipInterval) clearInterval(skipInterval);
    skipInterval = null;
  }

  let lastActiveUtt = -1;

  function tick() {
    if (!player || !player.getCurrentTime) return;
    const t = player.getCurrentTime();

    // Find current segment
    const idx = segments.findIndex(s => t >= s.start && t < s.end);

    // Update now-speaking pill
    const nowEl = document.getElementById('now-speaker');
    const skipInd = document.getElementById('skip-indicator');

    if (idx !== -1) {
      const seg = segments[idx];
      nowEl.textContent = `Speaker ${seg.speaker}`;
      nowEl.style.color = speakerColors[seg.speaker] || '';
      nowEl.style.borderColor = speakerColors[seg.speaker] || '';

      if (skippedSpeakers.has(seg.speaker)) {
        // Find where this speaker's run ends
        let endTime = seg.end;
        // Also skip consecutive segments of same speaker
        for (let j = idx + 1; j < segments.length; j++) {
          if (skippedSpeakers.has(segments[j].speaker)) {
            endTime = segments[j].end;
          } else {
            break;
          }
        }
        player.seekTo(endTime, true);
        nowEl.classList.add('skipping');
        skipInd.style.display = 'inline';
      } else {
        nowEl.classList.remove('skipping');
        skipInd.style.display = 'none';
      }

      // Scroll transcript
      if (idx !== lastActiveUtt) {
        document.querySelectorAll('.utterance').forEach(el => el.classList.remove('active-utt'));
        const activeEl = document.getElementById(`utt-${idx}`);
        if (activeEl) {
          activeEl.classList.add('active-utt');
          activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        lastActiveUtt = idx;
      }
    } else {
      nowEl.textContent = '—';
      nowEl.classList.remove('skipping');
      skipInd.style.display = 'none';
    }
  }

  // ─── UTILS ──────────────────────────────────────────────────
  function fmt(secs) {
    const m = Math.floor(secs / 60);
    const s = Math.floor(secs % 60);
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  // Enter key triggers process
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') processVideo();
  });
</script>
</body>
</html>
